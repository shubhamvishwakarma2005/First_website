<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
            color: white;
        }
        body{
            height: 100%;
            display: flex;
            justify-content: center;
        }
        .navbar{
            height: 100px;
            width: 90%;
            background-color: black;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
        }
        #logo{
            height: 80px;
            width: 80px;
            background-color: white;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #menu{
            height: 80px;
            width: 900px;
        }
        #button{
            height: 80px;
            width: 200px;
            font-size: 22px;
            color: black;
            background-color: white;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: space-around;
        }
     
       #menu>ul{
        height: 100%;
        font-size: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        list-style: none;
       }
       img{
        height: 50px;
        width: 50px;
        border-radius: 50px;
       }
    </style
</head>
<body>
    <div class="navbar">
        <div id="logo">
            <img src="jupiter.png">
            </div>
       
            <div id="menu">
            <ul>
                <li>Work</li>
                <li>About</li>
                <li>Playground</li>
                <li>Recorce</li>
            </ul>
            </div>
       
            <div id="button">ihyaet@gmil.com</div>
    </div>


    
</body>
</html>

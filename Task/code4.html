<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
            color: white;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 300px;
        }

        #navbar {
            height: 80px;
            width: 99%;
            background-color: black;
            display: flex;
            align-items: center;
            justify-content: space-between;

        }

        #logo-outer {
            height: 100%;
            width: 350px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }

         .logo-item-outer{
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            height: 100%;
            width: 60%;
            border-right:1px solid ;
        }
        #logo1 {
            height: 45px;
            width: 45px;
            font-size: 30px;
            background-color: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
       
        #logo2 {
            height: 45px;
            width: 45px;
            font-size: 30px;
            background-color: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        #logo3 {
            height: 45px;
            width: 45px;
            font-size: 30px;
            background-color: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        #account {
            width: 150px;
            height: 100%;
            font-size: 30px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
           border-right:1px solid ;

        }

        #menu {
            height: 100%;
            width: 700px;
            display: flex;
            align-items: center;
            justify-content: space-around;

        }

        #menu>ul {
            height: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            list-style: none;
        }

        #menu>ul>li {
            height: 100%;
            text-decoration: none;
            font-size: 23px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid;
        }

        #search-outer {
            height: 60px;
            width: 300px;
            display: flex;
            justify-items: center;
            align-items: center;
        }

        #search1 {
            padding: 11px;
            width: 80%;
            border: none;
            outline: none;
            color: black;
            font-size: 20px;
        }

        #search2 {
            height: 45px;
            width: 45px;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;

        }
    </style>
</head>

<body>
    <div id="navbar">
        <div id="logo-outer">
            <div class="logo-item-outer">
                <div id="logo1"><i class="fa-solid fa-b" style="color: rgb(26, 26, 25);"></i></div>
                <div id="logo2"><i class="fa-solid fa-b" style="color: rgb(26, 26, 25);"></i></div>
                <div id="logo3"><i class="fa-solid fa-c" style="color: rgb(26, 26, 25);"></i></i></div>
            </div>
            <div id="account">
                <i class="fa-solid fa-circle-user" style="color: rgb(239, 242, 246);"></i>
                Sing in
            </div>
        </div>
        <div id="menu">
            <ul>
                <li>News</li>
                <li>Sport</li>
                <li>Reel</li>
                <li>Worklife</li>
                <li>Travel</li>
                <li>Future</li>
                <li>More</li>
            </ul>
        </div>
        <div id="search-outer">
            <input type="search" id="search1">
            <div id="search2">
                <i class="fa-solid fa-magnifying-glass" style="color: rgb(16, 16, 17);"></i>
            </div>
        </div>

    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>

    <link rel="shortcut icon" href="/assets/facebook.avif" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
        }
        #facebook-coverpage{
            height: 100vh;
            width: 100%;
            background-color: lightgoldenrodyellow;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #main1{
            height: 300px;
            width: 350px;
            border: 1px solid black;
        }
        h1{
            position: relative;
            top: 50px;
            left: 20px;
            color: #1877F2;
            font-size: 50px;
            font-family: Facebook Sans;
        }
        p{
            position: relative;
            top: 70px;
            left: 20px;
            font-size: 20px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        #main2{
            height: 300px;
            width: 350px;
            background-color: plum;
            text-align: center;
        }
        #email{
            height: 40px;
            width: 90%;
            position: relative;
            top: 30px;
            border-radius: 5px;
        }
        #password{
            height: 40px;
            width: 90%;
            position: relative;
            top: 20px;
            border-radius: 5px;
        }
        button{
            height: 40px;
            width: 90%;
            position: relative;
            top: 30px;
            border-radius: 5px;
            background-color: #1877F2;
            color: white;
            font-size: 18px;
        }
        span{
            font-size: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="facebook-coverpage">
        
        <div id="main1">
            <h1>
                facebook
            </h1>

            <p>
                Facebook helps you connect and share with the people in your life.
            </p>
        </div>

        <div id="main2">
            <input id="email" type="email" placeholder="Email address or phone number">

            <br><br>

            <input id="password" type="password" placeholder="Password">

            <button>Log in</button>

            <span>
                <a href="#">
                    Forgot password?
                </a>
            </span>

        </div>

    </div>
</body>
</html>

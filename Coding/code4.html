<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        padding: 0px;
        margin: 0px;
        box-sizing: border-box;
    }
    #navbar{
        height: 80px;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: black;
        color: white;
        position: sticky;
        top: 0px;
    }
    #navbar ul{
        display: flex;
        width: 50%;
        justify-content: space-evenly;
        font-size: 20px;
    }
    #navbar ul li{
        list-style: none;
        text-transform: uppercase;
    }
    #navbar ul li a{
        color: white;
        text-decoration: none;
    }
    .section{
        height: 100vh;
        width: 100%;
        background-color: purple;
    }
    .section:nth-child(even){
        background-color: orange;
    }
    #upper-navbar{
        text-align: center;
        padding: 10px 50px;
        text-transform: uppercase;
    }
</style>
<body>
    <div id="upper-navbar">
        <p>
            this is a normal testing heading
        </p>
    </div>
    <div id="navbar">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Gallary</a></li>
            <li><a href="#">contect</a></li>
            <li><a href="#">Help</a></li>
        </ul>

    </div>

    <div class="section"></div>
    <div class="section"></div>
    <div class="section"></div>
    <div class="section"></div>
    <div class="section"></div>
</body>
</html>

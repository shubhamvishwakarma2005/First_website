<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
        }
        body{
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .navbar{
            height: 100px;
            width: 80%;
            background-color: black;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: space-around;
        }
        .logo{
            height: 80px;
            width: 80px;
            background-color: red;
            border-radius: 50%;
        }
        .menu{
            height: 80px;
            width: 800px;
            background-color: darkblue;
        }
        .btn{
            height: 80px;
            width: 200px;
            background-color: violet;
            border-radius: 50px;
        }
 
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo"></div>
        <div class="menu"></div>
        <div class="btn"></div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            padding: 0px;
            margin: 0;
            box-sizing: border-box;
        }

        #parent{
            height: 600px;
            width: 500px;
            border: 4px dotted gray;
            margin: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        #block{
            width: 100%;
            height: 31%;      
            width: 100%;
            display: flex;
            justify-content: space-between;
        }

       #box1{
            height: 100%;
            width: 30%;
            background-color: red;
       }

       #box2{
            width: 65%;
            height: 100%;
            background-color: yellow;
       }

       

      
        #block2{
            height: 31%;
            width: 100%;
            display: flex;
            justify-content: space-between;
        }

        #box3{
            width: 65%;
            height: 100%;
            background-color: orange;
        }

        #box4{
            height: 100%;
            width: 30%;
            background-color: blue;
        }
        #block3{
            height: 31%;
            background-color: yellowgreen;
            width: 100%;  
        }
    </style>

</head>
<body>
    
    <div id="parent">

        <div id="block">
            <div id="box1"></div>
            <div id="box2"></div>
        </div>
        <div id="block2">
            <div id="box3"></div>
            <div id="box4"></div>
        </div>
        <div id="block3"></div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .a{
            height:400px;
            width: 400px;
            background-color: rgb(121, 111, 111);
        }
        .b{
            height: 300px;
            width: 100%;
          }
                 
        .c{
            height: 100px;
            width: 100%;
           background-color: transparent;
        }
        .b>img{
            height: 100%;
            width: 100%;
        }

        .c>span{
            font-size: 30px;
            margin-left: 25%;
            line-height: 90px;
        }
    </style>
</head>
<body>
<div class="a">
    <div class="b">
        <img src="natural 1.jpg" alt="">
    </div>
    <div class="c">
       <span>This is new tag</span>
    </div>
</div>    
</body>
</html>
